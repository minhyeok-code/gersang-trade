# 현재 활성 슬롯(blue/green)을 가리키는 외부 파일 — deploy.sh가 교체 후 nginx -s reload
include /etc/nginx/conf.d/upstream.conf;

upstream nextjs {
    server front:3000;
}

server {
    listen 80;
    server_name _;

    # ── Spring Boot 직접 라우팅 ──────────────────────────────────────────

    # REST API
    location /api/ {
        proxy_pass         http://spring_boot;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # WebSocket (STOMP/SockJS) — Upgrade 헤더 필수
    location /ws {
        proxy_pass         http://spring_boot;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    location /ws/ {
        proxy_pass         http://spring_boot;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # OAuth2 인증 흐름
    location /oauth2/ {
        proxy_pass         http://spring_boot;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # OAuth2 콜백 (Google/Naver 인가 코드 수신)
    location /login/oauth2/ {
        proxy_pass         http://spring_boot;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # 토큰 갱신·로그아웃 (= 매칭: /auth/callback 은 Next.js 페이지로 유지)
    location = /auth/refresh {
        proxy_pass         http://spring_boot;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /auth/logout {
        proxy_pass         http://spring_boot;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # 관리자 API
    location /admin/ {
        proxy_pass         http://spring_boot;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Next.js (나머지 모든 경로) ──────────────────────────────────────

    location / {
        proxy_pass         http://nextjs;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Next.js HMR (개발 환경에서만 사용되나 안전을 위해 포함)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}

